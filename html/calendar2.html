<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch mượt Native</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}

.calendar {
    display: flex;
    height: 100vh;
    width: 300vw;
    touch-action: pan-y;
    cursor: grab;
}

.calendar:active {
    cursor: grabbing;
}

.page {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: white;
    user-select: none;
}

.date {
    font-size: 28px;
    font-weight: bold;
}

.weekday {
    font-size: 20px;
    margin-top: 10px;
    color: gray;
}
</style>
</head>
<body>

<div id="calendar" class="calendar">
    <div class="page" id="prev"></div>
    <div class="page" id="current"></div>
    <div class="page" id="next"></div>
</div>

<script>
const calendar = document.getElementById("calendar");
const prevPage = document.getElementById("prev");
const currentPage = document.getElementById("current");
const nextPage = document.getElementById("next");

let currentDate = new Date();
let width = window.innerWidth;
let baseTranslate = -width;
let currentTranslate = baseTranslate;

let startX = 0;
let currentX = 0;
let startTime = 0;
let isDragging = false;

/* ===== Render chỉ update text ===== */

function updatePage(page, date) {
    page.innerHTML = `
        <div class="date">${date.toLocaleDateString("vi-VN")}</div>
        <div class="weekday">${date.toLocaleDateString("vi-VN", { weekday: "long" })}</div>
    `;
}

function updateAllPages() {
    const prevDate = new Date(currentDate);
    prevDate.setDate(prevDate.getDate() - 1);

    const nextDate = new Date(currentDate);
    nextDate.setDate(nextDate.getDate() + 1);

    updatePage(prevPage, prevDate);
    updatePage(currentPage, currentDate);
    updatePage(nextPage, nextDate);
}

function setTranslate(x) {
    calendar.style.transform = `translateX(${x}px)`;
}

/* ===== Khởi tạo ===== */

updateAllPages();
setTranslate(baseTranslate);

/* ===== Pointer Events ===== */

calendar.addEventListener("pointerdown", e => {
    isDragging = true;
    startX = e.clientX;
    startTime = Date.now();
    calendar.style.transition = "none";
    calendar.setPointerCapture(e.pointerId);
});

calendar.addEventListener("pointermove", e => {
    if (!isDragging) return;

    currentX = e.clientX;
    let delta = currentX - startX;
    setTranslate(baseTranslate + delta);
});

calendar.addEventListener("pointerup", () => {
    if (!isDragging) return;
    isDragging = false;

    let delta = currentX - startX;
    let duration = Date.now() - startTime;
    let velocity = delta / duration;

    let shouldChange =
        Math.abs(delta) > width / 3 ||
        Math.abs(velocity) > 0.5;

    calendar.style.transition =
        "transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)";

    if (shouldChange) {
        if (delta < 0) {
            setTranslate(-2 * width);
            setTimeout(() => {
                currentDate.setDate(currentDate.getDate() + 1);
                updateAllPages();
                setTranslate(baseTranslate);
                calendar.style.transition = "none";
            }, 300);
        } else {
            setTranslate(0);
            setTimeout(() => {
                currentDate.setDate(currentDate.getDate() - 1);
                updateAllPages();
                setTranslate(baseTranslate);
                calendar.style.transition = "none";
            }, 300);
        }
    } else {
        setTranslate(baseTranslate);
    }
});

window.addEventListener("resize", () => {
    width = window.innerWidth;
    baseTranslate = -width;
    setTranslate(baseTranslate);
});
</script>

</body>
</html>
