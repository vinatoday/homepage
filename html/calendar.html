<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch mượt Native</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}

.calendar {
    display: flex;
    height: 100vh;
    width: 300vw;
    touch-action: pan-y;
    cursor: grab;
}

.calendar:active {
    cursor: grabbing;
}

.page {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: white;
    user-select: none;
}

.date {
    font-size: 28px;
    font-weight: bold;
}

.weekday {
    font-size: 20px;
    margin-top: 10px;
    color: gray;
}
</style>
</head>
<body>

<div id="calendar" class="calendar">
    <div class="page" id="prev"></div>
    <div class="page" id="current"></div>
    <div class="page" id="next"></div>
</div>




<script>
	const calendar = document.getElementById("calendar");

	let prevPage = document.getElementById("prev");
	let currentPage = document.getElementById("current");
	let nextPage = document.getElementById("next");

	let currentDate = new Date();
	let width = window.innerWidth;
	let baseTranslate = -width;

	let startX = 0;
	let currentX = 0;
	let startTime = 0;
	let isDragging = false;
	let direction = 0; // -1 = prev, 1 = next

	/* ===== Render ===== */
		function setTranslate(x) {
		calendar.style.transform = "translateX(" + x + "px)";
	}


	function viewPage(page, date) {
		const date1  = date.toLocaleDateString("vi-VN");
		const weekly = date.toLocaleDateString("vi-VN", { weekday: "long" });
		page.innerHTML = '<div class="date">'   + date1  +'</div>'
						+'<div class="weekday">'+ weekly +'</div>';
	}


	/* ===== Khởi tạo ban đầu ===== */
	function initPages() {
		const prevDate = new Date(currentDate);
		const nextDate = new Date(currentDate);
		prevDate.setDate(prevDate.getDate() - 1);
		nextDate.setDate(nextDate.getDate() + 1);

		viewPage(prevPage, prevDate);
		viewPage(currentPage, currentDate);
		viewPage(nextPage, nextDate);

		setTranslate(baseTranslate);
	}

	initPages();

	/* ===== Swipe logic ===== */
	calendar.addEventListener("pointerdown", e => {
		isDragging = true;
		startX = e.clientX;
		currentX = e.clientX;
		startTime = Date.now();
		calendar.style.transition = "none";
		calendar.setPointerCapture(e.pointerId);
	});

	calendar.addEventListener("pointermove", e => {
		if (!isDragging) return;
		currentX = e.clientX;
		const delta = currentX - startX;
		setTranslate(baseTranslate + delta);
	});

	calendar.addEventListener("pointerup", () => {
		if (!isDragging) return;
		isDragging = false;

		const delta = currentX - startX;
		const duration = Date.now() - startTime;
		const velocity = delta / duration;
		const shouldChange = Math.abs(delta) > width / 3 || Math.abs(velocity) > 0.5;

		calendar.style.transition = "transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)";
		if (shouldChange) {
			if (delta < 0) {
				direction = 1;
				setTranslate(-2 * width);
			} else {
				direction = -1;
				setTranslate(0);
			}
		} else {
			direction = 0;
			setTranslate(baseTranslate);
		}
	});



	calendar.addEventListener("transitionend", () => { //Sau khi animation kết thúc
		if (direction === 0) return;
		if (direction === 1) {
			moveNext();
		} else {
			movePrev();
		}
		direction = 0;
	});

	
	
	
	function moveNext() {
		currentDate.setDate(currentDate.getDate() + 1);
		calendar.appendChild(prevPage);// Đưa prev ra cuối

		const oldPrev = prevPage;
		prevPage = currentPage;
		currentPage = nextPage;
		nextPage = oldPrev;

		const newNextDate = new Date(currentDate);
		newNextDate.setDate(newNextDate.getDate() + 1);
		viewPage(nextPage, newNextDate);

		calendar.style.transition = "none";
		setTranslate(baseTranslate);
	}




	function movePrev() {
		currentDate.setDate(currentDate.getDate() - 1);

		calendar.insertBefore(nextPage, calendar.firstChild);// Đưa next lên đầu

		const oldNext = nextPage;
		nextPage = currentPage;
		currentPage = prevPage;
		prevPage = oldNext;

		const newPrevDate = new Date(currentDate);
		newPrevDate.setDate(newPrevDate.getDate() - 1);
		viewPage(prevPage, newPrevDate);

		calendar.style.transition = "none";
		setTranslate(baseTranslate);
	}






	/* ===== Resize ===== */
	window.addEventListener("resize", () => {
		width = window.innerWidth;
		baseTranslate = -width;
		setTranslate(baseTranslate);
	});
</script>




</body>
</html>
